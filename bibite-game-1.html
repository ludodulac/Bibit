<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>BIBITE</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: #111;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  overflow: hidden;
  touch-action: manipulation;
}

#wrapper {
  position: relative;
  height: min(95vh, calc(95vw * 1844 / 853));
  width: min(95vw, calc(95vh * 853 / 1844));
}

#console-img {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  object-fit: fill;
  pointer-events: none;
  user-select: none;
  display: block;
}

/* LCD zone: x 98-751/853=11.49%–88.04%, y 259-1351/1844=14.05%–73.27% */
#lcd {
  position: absolute;
  left: 11.49%;
  top: 14.05%;
  width: 76.55%;
  height: 59.22%;
  overflow: hidden;
}

/* ── SCORE ── */
#score-bar {
  position: absolute;
  top: 3%;
  left: 4%;
  right: 4%;
  display: flex;
  justify-content: space-between;
  align-items: center;
  z-index: 10;
  pointer-events: none;
}
.score-block { text-align: center; }
.lcd-label {
  font-family: "Courier New", monospace;
  font-size: clamp(8px, 2vw, 13px);
  font-weight: bold;
  color: #2a2a1a;
  letter-spacing: 0.1em;
  opacity: 0.6;
  line-height: 1;
}
.lcd-digits {
  font-family: "Courier New", monospace;
  font-size: clamp(18px, 5vw, 36px);
  font-weight: bold;
  color: #2a2a1a;
  letter-spacing: 0.1em;
  line-height: 1.1;
}

/* ── MOT ── */
#word-area {
  position: absolute;
  top: 42%;
  left: 50%;
  transform: translate(-50%, -50%);
  text-align: center;
  z-index: 20;
  pointer-events: none;
  width: 95%;
}
#word-display {
  font-family: "Courier New", monospace;
  font-size: clamp(22px, 7vw, 52px);
  font-weight: bold;
  color: #2a2a1a;
  letter-spacing: 0.2em;
  min-height: 1.3em;
  word-break: break-all;
  text-shadow: 1px 1px 0 rgba(0,0,0,0.1);
}

/* barre de temps */
#time-bar-wrap {
  width: 80%;
  height: 5px;
  background: rgba(42,42,26,0.15);
  margin: 10px auto 0;
  border-radius: 3px;
  overflow: hidden;
}
#time-bar { height:100%; background:#2a2a1a; width:100%; transform-origin:left; }

/* ── FEEDBACK ── */
#feedback {
  position: absolute;
  top: 22%;
  left: 50%;
  transform: translateX(-50%);
  font-family: "Courier New", monospace;
  font-size: clamp(13px, 3.5vw, 24px);
  font-weight: bold;
  letter-spacing: 0.15em;
  color: #2a2a1a;
  opacity: 0;
  z-index: 30;
  pointer-events: none;
  white-space: nowrap;
}
#feedback.show { animation: feedbk 0.8s ease-out forwards; }
@keyframes feedbk {
  0%   { opacity:1; transform:translateX(-50%) scale(1.2); }
  60%  { opacity:1; transform:translateX(-50%) scale(1); }
  100% { opacity:0; transform:translateX(-50%) scale(0.95); }
}

/* ── FLASH LCD ── */
@keyframes flash-good { 0%,100%{background:transparent} 50%{background:rgba(120,200,120,0.4)} }
@keyframes flash-bad  { 0%,100%{background:transparent} 40%{background:rgba(200,100,90,0.4)} }
#lcd.flash-good { animation: flash-good 0.35s ease; }
#lcd.flash-bad  { animation: flash-bad  0.4s ease; }

/* ── OVERLAYS ── */
.overlay {
  position: absolute;
  inset: 0;
  background: rgba(184,196,160,0.97);
  z-index: 50;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 0;
}
.overlay-title {
  font-family: "Courier New", monospace;
  font-size: clamp(16px, 5vw, 32px);
  font-weight: bold;
  letter-spacing: 0.3em;
  color: #2a2a1a;
  margin-bottom: 4px;
}
.overlay-sub {
  font-family: "Courier New", monospace;
  font-size: clamp(8px, 2vw, 13px);
  letter-spacing: 0.2em;
  color: #4a4a3a;
  margin-bottom: 12px;
}
.menu-sep {
  font-family: "Courier New", monospace;
  font-size: clamp(7px, 1.8vw, 11px);
  color: #3a3a2a;
  letter-spacing: 0.1em;
  margin: 4px 0 2px;
  opacity: 0.55;
  text-align: center;
}
.menu-item {
  font-family: "Courier New", monospace;
  font-size: clamp(9px, 2.2vw, 14px);
  letter-spacing: 0.12em;
  color: #2a2a1a;
  padding: 4px 12px;
  opacity: 0.45;
  display: flex;
  align-items: center;
  gap: 8px;
  white-space: nowrap;
}
.menu-item.selected { opacity:1; border:1px solid #2a2a1a; border-radius:2px; }

/* game over shame text */
#shame-text {
  font-family: "Courier New", monospace;
  font-size: clamp(10px, 2.8vw, 18px);
  color: #4a2a2a;
  letter-spacing: 0.05em;
  text-align: center;
  padding: 0 10px;
  margin: 6px 0;
  font-style: italic;
}

/* ── BOUTONS INVISIBLES ── */
.btn-zone {
  position: absolute;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  background: transparent;
  border: none;
  z-index: 100;
}
/* Bouton gauche centre ~x=218/853=25.6%, y=1615/1844=87.6%, r≈9% */
#btn-left  { left:16%; top:83.5%; width:19%; padding-bottom:19%; border-radius:50%; }
/* Bouton droit centre ~x=634/853=74.3% */
#btn-right { left:65%; top:83.5%; width:19%; padding-bottom:19%; border-radius:50%; }
/* SELECT */
#btn-select { left:41%; top:86.2%; width:17%; height:5%; border-radius:20px; }
</style>
</head>

        <svg width="14" height="14" viewBox="0 0 14 14"><rect x="1" y="6" width="12" height="4" rx="2" fill="#2a2a1a" opacity="0.8"/><rect x="6" y="2" width="3" height="6" rx="1" fill="#2a2a1a" opacity="0.8"/></svg>
        SEXE MASC.
      </div>
      <div class="menu-item" id="m1">
        <svg width="14" height="14" viewBox="0 0 14 14"><circle cx="4.5" cy="7" r="3.5" fill="#2a2a1a" opacity="0.8"/><circle cx="9.5" cy="7" r="3.5" fill="#2a2a1a" opacity="0.8"/></svg>
        SEINS
      </div>
      <div class="menu-item" id="m2">
        <svg width="14" height="14" viewBox="0 0 14 14"><ellipse cx="7" cy="8" rx="5" ry="4" fill="#2a2a1a" opacity="0.8"/><path d="M5 5 Q7 2 9 5" stroke="#2a2a1a" stroke-width="1.5" fill="none" opacity="0.8"/></svg>
        SEXE FEM.
      </div>
      <div class="menu-item" id="m3">
        <svg width="14" height="14" viewBox="0 0 14 14"><ellipse cx="4.5" cy="8" rx="3" ry="4.5" fill="#2a2a1a" opacity="0.8"/><ellipse cx="9.5" cy="8" rx="3" ry="4.5" fill="#2a2a1a" opacity="0.8"/></svg>
        FESSES
      </div>
      <div class="menu-item selected" id="m4">
        <svg width="14" height="14" viewBox="0 0 14 14"><rect x="1" y="1" width="12" height="12" rx="2" fill="none" stroke="#2a2a1a" stroke-width="1.5" opacity="0.8"/><path d="M3 7 L6 10 L11 4" stroke="#2a2a1a" stroke-width="1.5" fill="none" opacity="0.8"/></svg>
        TOUT
      </div>
      <div class="menu-sep" style="margin-top:10px;">◄ ► pour choisir</div>
      <div class="menu-sep">SELECT pour lancer</div>
    </div>

    <!-- GAME OVER -->
    <div class="overlay" id="gameover-screen" style="display:none">
      <div class="overlay-title">GAME OVER</div>
      <div id="shame-text"></div>
      <div class="menu-sep" id="go-score" style="font-size:clamp(12px,3vw,20px);opacity:1;margin-top:8px;"></div>
      <div class="menu-sep" id="go-hiscore" style="opacity:0.7;"></div>
      <div class="menu-sep" style="margin-top:14px;">SELECT = REJOUER</div>
    </div>

  </div>

  <button class="btn-zone" id="btn-left"   aria-label="NON"></button>
  <button class="btn-zone" id="btn-right"  aria-label="OUI"></button>
  <button class="btn-zone" id="btn-select" aria-label="SELECT"></button>

</div>

<script>
// ══════════════════════════════════════
//  AUDIO (Web Audio API — sons rétro)
// ══════════════════════════════════════
const AC = new (window.AudioContext || window.webkitAudioContext)();

function beep(freq, dur, type="square", vol=0.18) {
  const o = AC.createOscillator();
  const g = AC.createGain();
  o.connect(g); g.connect(AC.destination);
  o.type = type; o.frequency.value = freq;
  g.gain.setValueAtTime(vol, AC.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, AC.currentTime + dur);
  o.start(); o.stop(AC.currentTime + dur);
}

function soundReveal() { beep(880, 0.04, "square", 0.08); }

function soundGood() {
  beep(523, 0.08, "square", 0.2);
  setTimeout(()=>beep(659, 0.08, "square", 0.2), 80);
  setTimeout(()=>beep(784, 0.12, "square", 0.2), 160);
}

function soundBad() {
  beep(220, 0.08, "sawtooth", 0.22);
  setTimeout(()=>beep(180, 0.15, "sawtooth", 0.22), 90);
}

function soundBonus() {
  [523,659,784,1047].forEach((f,i)=>setTimeout(()=>beep(f,0.07,"square",0.22),i*60));
}

function soundStart() {
  [330,392,523].forEach((f,i)=>setTimeout(()=>beep(f,0.1,"square",0.15),i*100));
}

function soundGameover() {
  [392,349,330,294,262].forEach((f,i)=>setTimeout(()=>beep(f,0.15,"sawtooth",0.2),i*120));
}

// ══════════════════════════════════════
//  DONNÉES
// ══════════════════════════════════════
const CATEGORIES = {
  masc: ["zizi","kiki","quéquette","bistouquette","dard","queue","machin","manche",
    "bite","teub","zob","biroute","pine","zgeg","zguègue","chibre","pénis",
    "membre","verge","phallus","braquemart","vit","gourdin","engin","calibre",
    "trique","gland","joystick"],
  seins: ["seins","nichons","nénés","boobs","loches","roberts","roplopos","lolos",
    "mamelles","poitrine","balcon","airbags","obus","melons","pastèques",
    "mandarines","citrons","bonnets","roplons"],
  fem: ["chatte","minou","minette","fente","foufoune","foufounette","choune",
    "chouchou","chattelette","minouquette","chiboulette","sexe","vulve","chibette"],
  fesses: ["cul","derrière","fesses","boule","popotin","postérieur","arrière-train",
    "fessier","croupe","zadin","croupion","fessouille","fessounette","fessette","banane"]
};

const FAUX = [
  "zigzag","kikuyu","manteau","machine","manchot","quête","querelle","quelle",
  "darder","pinel","vergeur","phare","calibrer","glandeur","joie","pistolet",
  "vigueur","vital","vitesse","birou","bistouri","biquette","bicoque","pinocher",
  "pinède","pénitence","carabine","tringle","périnée","seinture","nickel","nichoir",
  "néné","mammouth","mamie","poitrail","balconnet","citronnier","melonnade","pasteur",
  "mandarine","mandat","bobine","obusier","bonneterie","chatouille","minuscule",
  "minute","minuit","fenêtre","fourmi","fourrage","fourrure","chouette","choucroute",
  "vulgarité","chibani","sexuel","ventre","ventouse","culinaire","culture","culotte",
  "ferrière","fessée","boules","boulet","popotam","postillon","croupier","zinédine",
  "croissant","bananier","croupissant","posterité","zinzin","minet","mineur",
  "minotaure","chiendent","cordage","bordure","calibrage","lingot","lingerie",
  "tricoter","taquet","balançoire","rondeur","loterie","sexagénaire","verglas",
  "trinquet","galoche","barbiche","bitume","manceau","manchette","dardeau","triqueur",
  "glandage","calibrage","masque","bibelot","mobile","biberon","bibelot","minaret"
];

const SHAME_PHRASES = [
  "Oh le nul...",
  "Tu fais vraiment pitié !",
  "T\'as pas honte ?!",
  "Même un poisson rouge ferait mieux.",
  "C\'est catastrophique, vraiment.",
  "Retourne à l\'école !",
  "Mon chien joue mieux que toi.",
  "Tu confonds tout, c\'est impressionnant.",
  "Niveau zéro absolu.",
  "On a vu des meilleurs, beaucoup."
];

// ══════════════════════════════════════
//  ÉTAT
// ══════════════════════════════════════
const S = {
  screen: "menu", mode: 4,
  score: 0, hiScore: +(localStorage.getItem("bibite_hi") || 0),
  word: "", isValid: false, revealed: 0,
  revTimer: null, toTimer: null,
  answering: false, menuCursor: 4,
};

const REVEAL_DELAY = 500;  // ms entre chaque lettre
const TIME_LIMIT   = 6000; // ms pour répondre après mot complet

function pickWord() {
  S.isValid = Math.random() > 0.45;
  if (S.isValid) {
    const pool = S.mode === 4
      ? Object.values(CATEGORIES).flat()
      : Object.values(CATEGORIES)[S.mode];
    return pool[Math.floor(Math.random() * pool.length)];
  }
  return FAUX[Math.floor(Math.random() * FAUX.length)];
}

// ══════════════════════════════════════
//  JEU
// ══════════════════════════════════════
function newWord() {
  clearTimers();
  S.answering = false;
  S.word = pickWord();
  S.revealed = 0;
  document.getElementById("word-display").textContent = "";
  startBar(TIME_LIMIT + S.word.length * REVEAL_DELAY);
  revealNext();
}

function revealNext() {
  if (S.revealed >= S.word.length) {
    S.toTimer = setTimeout(() => { if (!S.answering) doTimeout(); }, TIME_LIMIT);
    return;
  }
  S.revealed++;
  document.getElementById("word-display").textContent =
    S.word.slice(0, S.revealed).toUpperCase();
  soundReveal();
  S.revTimer = setTimeout(revealNext, REVEAL_DELAY);
}

function startBar(ms) {
  const b = document.getElementById("time-bar");
  b.style.transition = "none"; b.style.width = "100%"; b.offsetWidth;
  b.style.transition = "width " + ms + "ms linear"; b.style.width = "0%";
}
function stopBar() {
  const b = document.getElementById("time-bar");
  b.style.transition = "none"; b.style.width = getComputedStyle(b).width;
}

// ── RÉPONSE ──
function answer(playerSaysYes) {
  if (S.answering || S.screen !== "game") return;
  // Résume l'audio context si suspendu (politique navigateur)
  if (AC.state === "suspended") AC.resume();
  S.answering = true;
  clearTimers(); stopBar();

  const early = S.revealed <= 3; // réponse sur les 3 premières lettres

  if (playerSaysYes === S.isValid) {
    // BONNE RÉPONSE
    const pts = early ? 5 : 1;
    S.score += pts;
    if (S.score > S.hiScore) {
      S.hiScore = S.score;
      localStorage.setItem("bibite_hi", S.hiScore);
    }
    updateUI();
    flash(true);
    early ? soundBonus() : soundGood();
    showFeedback(early ? "+" + pts + "  EARLY !" : "+" + pts, true);
    setTimeout(newWord, 900);
  } else {
    // MAUVAISE RÉPONSE
    const penalty = early ? 5 : 1;
    S.score -= penalty;
    updateUI();
    flash(false);
    soundBad();
    showFeedback(early ? "-" + penalty + "  RATÉ !" : "-" + penalty, false);

    if (S.score < 0) {
      setTimeout(gameOver, 900);
    } else {
      setTimeout(newWord, 900);
    }
  }
}

function doTimeout() {
  if (S.answering || S.screen !== "game") return;
  S.answering = true;
  clearTimers();
  S.score -= 1;
  updateUI();
  flash(false); soundBad();
  showFeedback("TEMPS ! -1", false);
  if (S.score < 0) setTimeout(gameOver, 900);
  else setTimeout(newWord, 900);
}

// ══════════════════════════════════════
//  UI
// ══════════════════════════════════════
function updateUI() {
  document.getElementById("score-display").textContent  = S.score;
  document.getElementById("hiscore-display").textContent = S.hiScore;
}

function flash(good) {
  const lcd = document.getElementById("lcd");
  lcd.classList.remove("flash-good", "flash-bad");
  void lcd.offsetWidth;
  lcd.classList.add(good ? "flash-good" : "flash-bad");
  setTimeout(() => lcd.classList.remove("flash-good", "flash-bad"), 450);
}

function showFeedback(txt, good) {
  const el = document.getElementById("feedback");
  el.textContent = txt;
  el.style.color = good ? "#1a4a1a" : "#5a1a1a";
  el.classList.remove("show"); void el.offsetWidth; el.classList.add("show");
}

// ══════════════════════════════════════
//  GAME OVER
// ══════════════════════════════════════
function gameOver() {
  clearTimers(); S.screen = "gameover";
  document.getElementById("word-display").textContent = "";
  document.getElementById("time-bar").style.width = "0%";
  soundGameover();

  const phrase = SHAME_PHRASES[Math.floor(Math.random() * SHAME_PHRASES.length)];
  document.getElementById("shame-text").textContent = phrase;
  document.getElementById("go-score").textContent =
    "SCORE : " + S.score;
  document.getElementById("go-hiscore").textContent =
    S.score >= S.hiScore ? "★ NOUVEAU RECORD ★" : "RECORD : " + S.hiScore;

  document.getElementById("gameover-screen").style.display = "flex";
  document.getElementById("menu-screen").style.display = "none";
}

// ══════════════════════════════════════
//  START
// ══════════════════════════════════════
function startGame() {
  S.screen = "game"; S.score = 0;
  document.getElementById("menu-screen").style.display = "none";
  document.getElementById("gameover-screen").style.display = "none";
  updateUI();
  soundStart();
  setTimeout(newWord, 600);
}

// ══════════════════════════════════════
//  MENU
// ══════════════════════════════════════
function renderMenu() {
  ["m0","m1","m2","m3","m4"].forEach((id, i) =>
    document.getElementById(id).classList.toggle("selected", i === S.menuCursor));
}

// ══════════════════════════════════════
//  CONTRÔLES
// ══════════════════════════════════════
function onLeft() {
  if (AC.state === "suspended") AC.resume();
  if (S.screen === "menu") {
    S.menuCursor = (S.menuCursor - 1 + 5) % 5;
    renderMenu();
    beep(440, 0.05, "square", 0.1);
  } else if (S.screen === "game") {
    answer(false);
  } else if (S.screen === "gameover") {
    // retour menu
    document.getElementById("gameover-screen").style.display = "none";
    document.getElementById("menu-screen").style.display = "flex";
    S.screen = "menu";
  }
}

function onRight() {
  if (AC.state === "suspended") AC.resume();
  if (S.screen === "menu") {
    S.menuCursor = (S.menuCursor + 1) % 5;
    renderMenu();
    beep(440, 0.05, "square", 0.1);
  } else if (S.screen === "game") {
    answer(true);
  } else if (S.screen === "gameover") {
    document.getElementById("gameover-screen").style.display = "none";
    document.getElementById("menu-screen").style.display = "flex";
    S.screen = "menu";
  }
}

function onSelect() {
  if (AC.state === "suspended") AC.resume();
  if (S.screen === "menu") {
    S.mode = S.menuCursor;
    startGame();
  } else if (S.screen === "gameover") {
    document.getElementById("gameover-screen").style.display = "none";
    document.getElementById("menu-screen").style.display = "flex";
    S.screen = "menu";
  }
}

function clearTimers() {
  clearTimeout(S.revTimer); clearTimeout(S.toTimer);
}

document.getElementById("btn-left").addEventListener("click", onLeft);
document.getElementById("btn-right").addEventListener("click", onRight);
document.getElementById("btn-select").addEventListener("click", onSelect);

document.addEventListener("keydown", e => {
  if (e.key==="ArrowLeft"  || e.key==="q" || e.key==="Q") { e.preventDefault(); onLeft(); }
  if (e.key==="ArrowRight" || e.key==="d" || e.key==="D") { e.preventDefault(); onRight(); }
  if (e.key==="Enter"      || e.key===" ")                 { e.preventDefault(); onSelect(); }
});

// INIT
document.getElementById("hiscore-display").textContent = S.hiScore;
renderMenu();
</script>
</body>
</html>
